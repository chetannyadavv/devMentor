services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: devmentor
      POSTGRES_PASSWORD: devmentor_dev_password
      POSTGRES_DB: devmentor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  # Sits between judge-worker and the real Docker socket. Only allows
  # container create/start/stop/logs/wait -- explicitly denies exec,
  # volume management, image building, swarm control. judge-worker never
  # gets raw access to /var/run/docker.sock.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy
    security_opt:
      - label:disable
    environment:
      CONTAINERS: 1
      POST: 1
      IMAGES: 1
      NETWORKS: 0
      VOLUMES: 0
      BUILD: 0
      EXEC: 0
      AUTH: 0
      SECRET: 0
      SWARM: 0
      SERVICES: 0
      TASKS: 0
      NODES: 0
      PLUGINS: 0
      SESSION: 0
      DISTRIBUTION: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  api:
    build:
      context: .
      dockerfile: docker/images/api/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://devmentor:devmentor_dev_password@postgres:5432/devmentor
      JWT_SECRET_KEY: dev-secret-change-me-in-real-deployment
      CELERY_BROKER_URL: redis://redis:6379/0
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./app:/app/app:z
      - ./alembic.ini:/app/alembic.ini:z
      - ./migrations:/app/migrations:z

  judge-worker:
    build:
      context: .
      dockerfile: docker/images/judge-worker/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://devmentor:devmentor_dev_password@postgres:5432/devmentor
      CELERY_BROKER_URL: redis://redis:6379/0
      # Talks to the socket-proxy, never the real socket directly.
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      SUBMISSIONS_LOCAL_DIR: /workspaces
      SUBMISSIONS_HOST_DIR: ${PWD}/judge_workspaces
    ports:
      - "9100:9100"
    depends_on:
      - postgres
      - redis
      - docker-socket-proxy
    volumes:
      - ./app:/worker/app:z
      - ./runner:/worker/runner:z
      - ./judge_workspaces:/workspaces:z

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:z
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - api
      - judge-worker

  grafana:
    image: grafana/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: devmentor_dev_password
    volumes:
      - ./grafana-datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:z
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
